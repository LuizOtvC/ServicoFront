<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Propostas do Projeto</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .page-title {
            color: #1a1a2e;
            font-weight: 700;
            font-size: 22px;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .btn-voltar {
            display: block;
            width: fit-content;
            margin: 0 auto 1.5rem;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.45rem 1.2rem;
            font-size: 13px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-voltar:hover { background: #2d2d50; color: white; }
        .proposta-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            border: none;
            margin-bottom: 1rem;
            padding: 1rem 1.25rem;
            transition: box-shadow 0.2s;
        }
        .proposta-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
        .proposta-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 4px;
        }
        .proposta-usuario { font-size: 15px; font-weight: 600; color: #1a1a2e; margin: 0; }
        .proposta-status {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            border-radius: 20px;
            padding: 2px 10px;
            white-space: nowrap;
        }
        .status-pendente { background: #fff3cd; color: #856404; }
        .status-aceita   { background: #d4edda; color: #155724; }
        .status-recusada { background: #f8d7da; color: #721c24; }
        .status-default  { background: #e2e3e5; color: #383d41; }
        .proposta-descricao { font-size: 12px; color: #666; margin: 6px 0 10px; }
        .proposta-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0f0f0;
            padding-top: 8px;
        }
        .proposta-valor { font-size: 14px; font-weight: 700; color: #2E5395; }
        .score-box {
            background: #f0f4ff;
            border: 1px solid #d0d9f5;
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 10px;
        }
        .score-total {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0 0 4px;
        }
        .score-detalhe {
            font-size: 11px;
            color: #666;
            margin: 2px 0;
        }
        .score-detalhe span { font-weight: 600; color: #2E5395; }
        .btn-acao {
            display: block;
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 0.5rem;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
            color: white;
        }
        .btn-aceitar { background: #1a1a2e; }
        .btn-aceitar:hover { background: #2d2d50; }
        .btn-recusar { background: #b00020; }
        .btn-recusar:hover { background: #8b0000; }
    </style>
</head>
<body>
    <div style="max-width: 520px; margin: 0 auto;">

        <a th:href="@{/listarMensagens}" class="btn-voltar">
            <i class="ti ti-arrow-left"></i> Voltar
        </a>

        <h2 class="page-title">Propostas do projeto</h2>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <div th:if="${#lists.isEmpty(propostas)}" class="text-center text-muted" style="margin-top: 3rem;">
            <i class="ti ti-mood-empty" style="font-size: 40px;"></i>
            <p style="margin-top: 8px;">Nenhuma proposta recebida ainda.</p>
        </div>

        <div th:each="p : ${propostas}" class="proposta-card">
            <div class="proposta-header">
                <p class="proposta-usuario">
                    <i class="ti ti-user" aria-hidden="true"></i>
                    <a th:href="@{/perfilId/{id}(id=${p.usuarioId})}" th:text="${p.nomeUsuario}">
                        Nome
                    </a>
                </p>
                <span class="proposta-status"
                      th:text="${p.status}"
                      th:classappend="${#strings.equalsIgnoreCase(p.status, 'PENDENTE')} ? 'status-pendente' :
                          (${#strings.equalsIgnoreCase(p.status, 'ACEITA')} ? 'status-aceita' :
                          (${#strings.equalsIgnoreCase(p.status, 'RECUSADA')} ? 'status-recusada' : 'status-default'))">
                </span>
            </div>

            <p class="proposta-descricao" th:text="${p.descricao}">Descrição</p>
            
            <p class="score-detalhe">
    Dias disponíveis:
    <span th:each="dia, stat : ${p.diasTrabalho}">
        <span th:text="${dia}"></span><span th:if="${!stat.last}">, </span>
    </span>
</p>

            <div class="proposta-footer">
                <span class="proposta-valor">R$ <span th:text="${p.valorProposto}">0,00</span></span>
            </div>

            <!-- score -->
            <div class="score-box">
                <p class="score-total">Score: <span th:text="${#numbers.formatDecimal(p.scoreTotal * 100, 1, 1)}">0</span>%</p>
                <p class="score-detalhe">Habilidades: <span th:text="${#numbers.formatDecimal(p.scoreServicos * 100, 1, 1)}">0</span>%</p>
                <p class="score-detalhe">Orçamento: <span th:text="${#numbers.formatDecimal(p.scoreOrcamento * 100, 1, 1)}">0</span>%</p>
                <p class="score-detalhe">Histórico: <span th:text="${#numbers.formatDecimal(p.scoreHistorico * 100, 1, 1)}">0</span>%</p>
            </div>

            <div th:if="${#strings.equalsIgnoreCase(p.status, 'PENDENTE')}" style="display: flex; gap: 8px;">
                <form th:action="@{/aceitar/{id}(id=${p.propostaId})}" method="post" style="flex: 1;">
                    <button type="submit" class="btn-acao btn-aceitar">Aceitar</button>
                </form>
                <form th:action="@{/recusar/{id}(id=${p.propostaId})}" method="post" style="flex: 1;">
                    <button type="submit" class="btn-acao btn-recusar">Recusar</button>
                </form>
            </div>
        </div>

    </div>
</body>
</html>
