<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Detalhes do Projeto</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .page-title {
            color: #1a1a2e;
            font-weight: 700;
            font-size: 22px;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .btn-voltar {
            display: block;
            width: fit-content;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.45rem 1.2rem;
            font-size: 13px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-voltar:hover { background: #2d2d50; color: white; }
        .topo {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            max-width: 700px;
            margin: 0 auto 1.5rem;
            gap: 1rem;
        }
        .usuario-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            padding: 1rem 1.25rem;
            min-width: 200px;
            max-width: 220px;
        }
        .usuario-card .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #3a3a6e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: white;
            margin: 0 auto 8px;
        }
        .usuario-card .u-nome {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a2e;
            text-align: center;
            margin: 0 0 2px;
        }
        .usuario-card .u-email {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin: 0 0 8px;
        }
        .usuario-card .u-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #555;
            margin-bottom: 4px;
        }
        .usuario-card .u-row i { color: #888; font-size: 14px; }
        .rep-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f0f4ff;
            border: 1px solid #d0d9f5;
            border-radius: 8px;
            padding: 5px 8px;
            margin-top: 8px;
        }
        .rep-badge i { font-size: 16px; color: #f5a623; }
        .rep-value { font-size: 13px; font-weight: 600; color: #1a1a2e; margin: 0; }
        .rep-label { font-size: 10px; color: #666; margin: 0; }
        .projeto-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            border: none;
            padding: 1.5rem;
            max-width: 700px;
            margin: 0 auto;
        }
        .projeto-titulo { font-size: 19px; font-weight: 700; color: #1a1a2e; margin: 0 0 6px; }
        .projeto-status {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            background: #d4edda;
            color: #155724;
            border-radius: 20px;
            padding: 3px 12px;
            margin-bottom: 1rem;
        }
        .projeto-servicos { font-size: 12px; color: #666; margin: 0 0 1rem; }
        .projeto-servicos span {
            display: inline-block;
            background: #f0f4ff;
            border: 1px solid #d0d9f5;
            border-radius: 20px;
            padding: 2px 8px;
            margin: 2px 4px 2px 0;
            font-size: 11px;
            color: #2E5395;
        }
        .projeto-detalhes { border-top: 1px solid #f0f0f0; padding-top: 12px; }
        .detalhe-row { font-size: 13px; color: #555; margin-bottom: 8px; }
        .detalhe-row strong {
            color: #1a1a2e;
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }
        .detalhe-row .valor { font-size: 14px; color: #333; }
    </style>
</head>
<body>

    <div class="topo">
        <a th:href="@{/projetos}" class="btn-voltar">
            <i class="ti ti-arrow-left"></i> Voltar
        </a>

        <div th:if="${usuario}" class="usuario-card">
            <div class="avatar" id="avatar-initials">?</div>
            <p class="u-nome" id="u-nome" th:text="${usuario.nome}">Nome</p>
            <p class="u-email" th:text="${usuario.email}">email</p>
            <div class="u-row">
                <i class="ti ti-phone"></i>
                <span th:text="${usuario.telefone}">—</span>
            </div>
            <div class="u-row">
                <i class="ti ti-clock"></i>
                <span th:text="${usuario.horasSemana}">—</span> h/semana
            </div>
            <div class="rep-badge">
                <i class="ti ti-star"></i>
                <div>
                    <p class="rep-label">Reputação</p>
                    <p class="rep-value" th:text="${usuario.reputacao}">0</p>
                </div>
            </div>
        </div>
    </div>

    <h2 class="page-title">Detalhes do projeto</h2>

    <div th:if="${erro}" class="alert alert-danger" style="max-width:700px;margin:0 auto 1rem;" th:text="${erro}"></div>

    <div th:if="${projeto}" class="projeto-card">
        <p class="projeto-titulo" th:text="${projeto.titulo}">Título</p>
        <span class="projeto-status" th:text="${projeto.status}">ABERTO</span>

        <p class="projeto-servicos">
            <span th:each="s : ${projeto.servicos}" th:text="${s}">Serviço</span>
        </p>

        <div class="projeto-detalhes">
            <div class="detalhe-row">
                <strong>Descrição</strong>
                <span class="valor" th:text="${projeto.descricao}">—</span>
            </div>
            <div class="detalhe-row">
                <strong>Orçamento</strong>
                <span class="valor">R$ <span th:text="${projeto.orcamento}">—</span></span>
            </div>
            <div class="detalhe-row">
                <strong>Horas estimadas</strong>
                <span class="valor"><span th:text="${projeto.horasEstimadas}">—</span>h</span>
            </div>
            <div class="detalhe-row">
                <strong>Score de risco</strong>
                <span class="valor" th:text="${projeto.scoreRisco}">—</span>
            </div>
            <div class="detalhe-row">
                <strong>Criado em</strong>
                <span class="valor" th:text="${#temporals.format(projeto.criadoEm, 'dd/MM/yyyy HH:mm')}">—</span>
            </div>
        </div>
    </div>

    <script>
        const nome = document.getElementById('u-nome')?.textContent?.trim() || '';
        const initials = nome.split(' ').filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('');
        const av = document.getElementById('avatar-initials');
        if (av && initials) av.textContent = initials;
    </script>
</body>
</html>
