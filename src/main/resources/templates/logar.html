<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login - ServiçoFinal</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <style>
        * { box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0d1b3e 0%, #12305e 45%, #1957a6 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Blobs desfocados de fundo, animados */
        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            opacity: 0.18;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            width: 480px;
            height: 480px;
            background: #3b82f6;
            top: -180px;
            right: -160px;
            animation: flutuar1 14s ease-in-out infinite;
        }

        body::after {
            width: 420px;
            height: 420px;
            background: #60a5fa;
            bottom: -160px;
            left: -140px;
            animation: flutuar2 16s ease-in-out infinite;
        }

        @keyframes flutuar1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 25px) scale(1.05); }
        }

        @keyframes flutuar2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(25px, -20px) scale(1.05); }
        }

        /* Formas onduladas SVG, animadas */
        .forma-decorativa {
            position: fixed;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .forma-1 {
            top: 14%;
            left: 6%;
            animation: flutuarForma1 9s ease-in-out infinite;
        }

        .forma-2 {
            bottom: 10%;
            right: 6%;
            animation: flutuarForma2 11s ease-in-out infinite;
        }

        @keyframes flutuarForma1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(10px, -14px) rotate(4deg); }
        }

        @keyframes flutuarForma2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-12px, 10px) rotate(-4deg); }
        }

        /* Card glass */
        .card {
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            position: relative;
            z-index: 1;
        }

        .card-header {
            background: transparent;
            border: none;
            padding: 1.8rem 1.5rem 0.4rem;
        }

        .card-header h4 {
            color: white;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .card-header p {
            color: #cbd5e1;
            font-size: 13px;
            margin: 0;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: #e2e8f0;
            margin-bottom: 4px;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 0.6rem 0.9rem;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.95);
            color: #222;
        }

        .form-control::placeholder {
            color: #9aa5b1;
        }

        .form-control:focus {
            background: #ffffff;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.25);
        }

        .btn-entrar {
            background: #0d1b3e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.7rem;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-entrar:hover {
            background: #16264f;
            color: white;
        }

        .alerta-erro {
            font-size: 13px;
            border-radius: 8px;
        }

        .link-cadastro {
            color: #93c5fd;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
        }

        .link-cadastro:hover {
            text-decoration: underline;
            color: #bfdbfe;
        }

        .divisor {
            font-size: 12px;
            color: #cbd5e1;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<!-- Formas onduladas decorativas -->
<svg width="0" height="0" style="position:absolute">
    <defs>
        <linearGradient id="degradeAzul" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#1957a6"/>
        </linearGradient>
    </defs>
</svg>
<div class="forma-decorativa forma-1">
    <svg width="150" height="95" viewBox="0 0 150 95" fill="none">
        <path d="M10 75 L48 38 L75 63 L118 22" stroke="url(#degradeAzul)" stroke-width="24" stroke-linecap="round" fill="none"/>
    </svg>
</div>
<div class="forma-decorativa forma-2">
    <svg width="170" height="75" viewBox="0 0 170 75" fill="none">
        <path d="M5 38 Q32 6, 60 38 T112 38 T165 38" stroke="url(#degradeAzul)" stroke-width="22" stroke-linecap="round" fill="none"/>
    </svg>
</div>

    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">

        <div class="card-header text-center">
            <h4 class="mb-1">ServiçoFinal</h4>
            <p>Entre na sua conta para continuar</p>
        </div>

        <div class="card-body p-4">

            <div th:if="${errorMessage}"
                 class="alert alert-danger alerta-erro d-flex align-items-center gap-2 py-2" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <form action="/logar" method="post" th:object="${user}">

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           th:field="*{email}"
                           placeholder="seu@email.com"
                           required autofocus/>
                </div>

                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password"
                           class="form-control"
                           id="senha"
                           th:field="*{senha}"
                           placeholder="••••••••"
                           required/>
                </div>

                <button type="submit" class="btn btn-entrar w-100" id="btn-logar">
                    Entrar
                </button>

            </form>

            <div class="text-center mt-3 divisor">
                Não tem uma conta?
                <a th:href="@{/registro}" class="link-cadastro">Cadastre-se aqui</a>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
