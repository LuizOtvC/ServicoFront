<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Projetos</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .page-title {
            color: #1a1a2e;
            font-weight: 700;
            font-size: 22px;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .projeto-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            border: none;
            margin-bottom: 1rem;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .projeto-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
        .projeto-titulo { font-size: 15px; font-weight: 600; color: #1a1a2e; margin: 0 0 4px; }
        .projeto-status {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            background: #d4edda;
            color: #155724;
            border-radius: 20px;
            padding: 2px 10px;
            margin-bottom: 8px;
        }
        .projeto-servicos { font-size: 12px; color: #666; margin: 0; }
        .projeto-servicos span {
            display: inline-block;
            background: #f0f4ff;
            border: 1px solid #d0d9f5;
            border-radius: 20px;
            padding: 2px 8px;
            margin: 2px;
            font-size: 11px;
            color: #2E5395;
        }
        .btn-voltar {
            display: block;
            width: fit-content;
            margin: 0 auto 1.5rem;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.45rem 1.2rem;
            font-size: 13px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-voltar:hover { background: #2d2d50; color: white; }

        /* detalhes expandidos */
        .projeto-detalhes {
            display: none;
            margin-top: 10px;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
        }
        .projeto-detalhes.aberto { display: block; }
        .detalhe-row { font-size: 12px; color: #555; margin-bottom: 4px; }
        .detalhe-row strong { color: #1a1a2e; }
    </style>
</head>
<body>
    <div style="max-width: 520px; margin: 0 auto;">

        <a th:href="@{/}" class="btn-voltar">
            <i class="ti ti-arrow-left"></i> Voltar
        </a>

        <h2 class="page-title">Projetos disponíveis</h2>

        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <div th:if="${#lists.isEmpty(projetos)}" class="text-center text-muted" style="margin-top: 3rem;">
            <i class="ti ti-mood-empty" style="font-size: 40px;"></i>
            <p style="margin-top: 8px;">Nenhum projeto aberto no momento.</p>
        </div>

        <div th:each="p : ${projetos}" class="projeto-card" th:onclick="|toggleDetalhes('detalhes-' + ${p.id})|">
    <p class="projeto-titulo" th:text="${p.titulo}">Título</p>
    <span class="projeto-status" th:text="${p.status}">ABERTO</span>
    <p class="projeto-servicos">
        <span th:each="s : ${p.servicos}" th:text="${s}">Serviço</span>
    </p>

    <div class="projeto-detalhes" th:id="|detalhes-${p.id}|">
        <p class="detalhe-row"><strong>Descrição:</strong> <span th:text="${p.descricao}">—</span></p>
        <p class="detalhe-row"><strong>Orçamento:</strong> R$ <span th:text="${p.orcamento}">—</span></p>
        <p class="detalhe-row"><strong>Horas estimadas:</strong> <span th:text="${p.horasEstimadas}">—</span>h</p>

        <a th:href="@{/projetoporId/{id}(id=${p.id})}"
           class="btn-ver-mais"
           onclick="event.stopPropagation()">
            Ver informações <i class="ti ti-arrow-right"></i>
        </a>
    </div>
</div>
    </div>

    <script>
        function toggleDetalhes(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('aberto');
        }
    </script>
</body>
</html>
