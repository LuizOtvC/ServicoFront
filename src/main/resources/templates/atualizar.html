<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Cadastro - ServiçoFinal</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}"/>
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            border: none;
        }
        .card-header {
            background: #1a1a2e;
            padding: 1.4rem 1.5rem;
            text-align: center;
        }
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #3a3a6e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin: 0 auto 10px;
        }
        .card-header h4 { color: white; font-weight: 600; margin: 0 0 2px; font-size: 18px; }
        .card-header p  { color: #adb5bd; font-size: 12px; margin: 0; }
        .card-body { padding: 1.25rem 1.5rem; }
        .info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row:last-of-type { border-bottom: none; }
        .info-row i { font-size: 17px; color: #888; width: 20px; flex-shrink: 0; }
        .info-label { font-size: 11px; color: #aaa; display: block; margin-bottom: 1px; }
        .info-value { font-size: 13px; color: #1a1a2e; font-weight: 500; }
        .rep-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f4ff;
            border: 1px solid #d0d9f5;
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 1rem;
        }
        .rep-badge i  { font-size: 20px; color: #f5a623; }
        .rep-label { font-size: 11px; color: #666; margin: 0; }
        .rep-value { font-size: 16px; font-weight: 600; color: #1a1a2e; margin: 0; line-height: 1; }
        .btn-editar {
            display: block;
            width: 100%;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.55rem;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-editar:hover { background: #2d2d50; color: white; }
    </style>

</head>
<body class="d-flex align-items-center justify-content-center py-4">

    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">

        <div class="card-header text-center">
            <h4 class="mb-1">Atualizar</h4>
            <p>Atualize seus dados</p>
        </div>

        <div class="card-body p-4">

            <div th:if="${errorMessage}"
                 class="alert alert-danger alerta-erro d-flex align-items-center gap-2 py-2" role="alert">
                <span th:text="${errorMessage}"></span>
            </div>

            <form action="/atualizar" method="post" th:object="${atualizar}" onsubmit="return validarFormulario()">

                <div class="mb-3">
                    <label class="form-label">Nome completo</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{nome}"
                           placeholder="João Silva"
                           required autofocus/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Horas semanais</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{horasSemana}"
                           placeholder="4323232"
                           required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="tel"
                           class="form-control"
                           th:field="*{telefone}"
                           placeholder="(11) 99999-9999"/>
                </div>

                

                <button type="submit" class="btn btn-editar w-100">
                    Atualizar
                </button>

            </form>

            <div class="text-center mt-3 divisor">
                Cancelar
                <a th:href="@{/}" class="link-login">Cancelar atualização de perfil</a>
            </div>

        </div>
    </div>


</body>
</html>
